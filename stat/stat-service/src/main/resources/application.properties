server.port=9090

spring.sql.init.mode=always

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5434/ewm-stat-service
spring.datasource.username=postgres-ewm-stat-service
spring.datasource.password=password

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

#---
spring.config.activate.on-profile=local

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:stat-local-db
spring.datasource.username=h2-ewm-stat-service-local
spring.datasource.password=password